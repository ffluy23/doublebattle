<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>배틀룸 1 - 대기실</title>
  <style>

    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0f2f5;
      color: #1a1a1a;
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: clamp(18px, 4vw, 28px);
      color: #2a6496;
      margin-bottom: 24px;
      letter-spacing: 2px;
      text-align: center;
    }

    .room-container {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 팀 박스 */
    .team-box {
      background: #fff;
      border: 2px solid #dde3ec;
      border-radius: 10px;
      padding: 16px;
    }

    .team-box.team-a { border-color: #2a6496; }
    .team-box.team-b { border-color: #e05555; }

    .team-label {
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .team-a .team-label { color: #2a6496; }
    .team-b .team-label { color: #c0392b; }

    .player-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: #f7f9fc;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .player-row:last-child { margin-bottom: 0; }

    .player-slot-label {
      color: #888;
      font-size: 12px;
      min-width: 56px;
    }

    .player-name {
      flex: 1;
      color: #1a1a1a;
    }



    /* 관전자 */
    .spectator-box {
      background: #fff;
      border: 1px solid #dde3ec;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #888;
    }

    /* 교체 요청 */
    #swap-request-display {
      background: #fff;
      border: 1px solid #f0a500;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #a06000;
      display: none;
